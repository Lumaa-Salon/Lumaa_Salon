<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg">
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: "Ignogito";
      src: url("Ignogito.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #EED9BF;
      --olive: #9CA175;
      --white-soft: #F1F1F1;
      --brown: #937B67;
      --dark-olive: #30392C;
      --deep-olive: #1F2B21;
      --deep-brown: #5F4B3B;
      --soft-shadow: rgba(31, 43, 33, 0.45);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: "Manrope", sans-serif;
      background: var(--olive);
      overflow: hidden;
    }

    body {
      color: var(--dark-olive);
    }

    .page {
      width: 100%;
      height: 100svh;
      position: relative;
      background:
        radial-gradient(circle at 18% 8%, rgba(238, 217, 191, 0.12), transparent 25%),
        radial-gradient(circle at 84% 18%, rgba(147, 123, 103, 0.28), transparent 28%),
        radial-gradient(circle at 50% 92%, rgba(238, 217, 191, 0.38), transparent 38%),
        linear-gradient(
          180deg,
          #1F2B21 0%,
          #34432F 24%,
          #6F7955 52%,
          #9CA175 78%,
          #B5B88D 100%
        );
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(8px, 1.6svh, 18px) 16px;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.06) 0%, transparent 28%, rgba(238,217,191,0.12) 54%, transparent 78%),
        repeating-linear-gradient(
          135deg,
          rgba(241,241,241,0.045) 0px,
          rgba(241,241,241,0.045) 1px,
          transparent 1px,
          transparent 18px
        );
      pointer-events: none;
    }

    .page::after {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      right: -180px;
      top: -160px;
      border-radius: 50%;
      background: rgba(238, 217, 191, 0.12);
      filter: blur(8px);
      pointer-events: none;
    }

    .poster {
      position: relative;
      z-index: 2;
      width: min(100%, 860px);
      height: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .brand {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .brand-logo {
      width: min(370px, 76vw);
      max-height: clamp(80px, 17svh, 175px);
      height: auto;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      mix-blend-mode: normal !important;
      filter: none !important;
      background: transparent;
      transform: translateX(clamp(-42px, -4vw, -18px));
    }

    .experience-box {
      width: min(94%, 740px);
      margin: clamp(34px, 5.2svh, 64px) auto 0;
      background: linear-gradient(180deg, rgba(31,43,33,0.98), rgba(48,57,44,0.97));
      border: 1px solid rgba(238,217,191,0.78);
      border-radius: clamp(86px, 15svh, 180px) clamp(86px, 15svh, 180px) 24px 24px;
      padding:
        clamp(28px, 4svh, 44px)
        clamp(14px, 4vw, 34px)
        clamp(18px, 2.8svh, 34px);
      box-shadow: 0 30px 80px var(--soft-shadow);
      overflow: visible;
    }

    .choose {
      margin-bottom: clamp(22px, 4.2svh, 44px);
      color: var(--white-soft);
    }

    .choose-small {
      font-family: "Manrope", sans-serif;
      font-size: clamp(0.64rem, 1.2svh, 0.95rem);
      letter-spacing: clamp(0.22em, 0.68vw, 0.44em);
      font-weight: 800;
      color: var(--white-soft);
      text-transform: uppercase;
    }

    .choose-big {
      font-family: "Manrope", sans-serif;
      font-size: clamp(2.6rem, 7svh, 5.9rem);
      line-height: 0.95;
      color: var(--cream);
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(12px, 3vw, 34px);
      margin-top: clamp(10px, 2svh, 22px);
    }

    .card {
      position: relative;
      height: clamp(190px, 34svh, 390px);
      cursor: pointer;
      border: 1px solid rgba(238,217,191,0.78);
      border-radius: clamp(72px, 13svh, 130px) clamp(72px, 13svh, 130px) 18px 18px;
      background: #111;
      overflow: visible;
      box-shadow: 0 18px 34px rgba(0,0,0,0.24);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 44px rgba(0,0,0,0.32);
    }

    .card-photo {
      width: 100%;
      height: 100%;
      border-radius: clamp(72px, 13svh, 130px) clamp(72px, 13svh, 130px) 18px 18px;
      overflow: hidden;
      position: relative;
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(0.2) brightness(0.58) contrast(1.08);
      transition: transform 0.45s ease, filter 0.45s ease;
    }

    .card:hover .card-photo img {
      transform: scale(1.06);
      filter: grayscale(0.05) brightness(0.7) contrast(1.12);
    }

    .card-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.45) 48%, transparent 72%);
      pointer-events: none;
    }

    .monogram {
      position: absolute;
      top: clamp(-27px, -3svh, -18px);
      left: 50%;
      transform: translateX(-50%);
      width: clamp(42px, 7svh, 62px);
      height: clamp(42px, 7svh, 62px);
      border-radius: 50%;
      overflow: hidden;
      z-index: 5;
      border: 2px solid var(--cream);
      background: var(--olive);
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    }

    .monogram img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      mix-blend-mode: normal !important;
      filter: none !important;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(14px, 2.8svh, 30px);
      z-index: 4;
      color: var(--white-soft);
      text-align: center;
      padding: 0 8px;
    }

    .card-content h3 {
      font-family: "Manrope", sans-serif;
      font-size: clamp(1.8rem, 4.9svh, 3.1rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      text-transform: lowercase;
      color: var(--white-soft);
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    .card-content p {
      margin-top: 7px;
      font-family: "Manrope", sans-serif;
      font-size: clamp(0.52rem, 1.05svh, 0.86rem);
      letter-spacing: clamp(0.18em, 0.55vw, 0.34em);
      color: var(--cream);
      font-weight: 800;
      text-transform: uppercase;
    }

    .line {
      width: 70%;
      height: 1px;
      background: rgba(238,217,191,0.72);
      margin: clamp(8px, 1.6svh, 18px) auto clamp(7px, 1.4svh, 14px);
    }

    .view {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.6vw, 14px);
      font-family: "Manrope", sans-serif;
      font-size: clamp(0.48rem, 1svh, 0.72rem);
      letter-spacing: clamp(0.12em, 0.5vw, 0.3em);
      color: var(--cream);
      font-weight: 800;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .arrow {
      width: clamp(24px, 4.6svh, 36px);
      height: clamp(24px, 4.6svh, 36px);
      border: 1px solid rgba(238,217,191,0.8);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.9rem, 2.4svh, 1.3rem);
      letter-spacing: 0;
      flex-shrink: 0;
    }

    .bottom-line {
      margin-top: clamp(14px, 2.5svh, 34px);
      color: var(--white-soft);
      text-align: center;
    }

    .bottom-script {
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(1.15rem, 2.8svh, 1.85rem);
      color: var(--cream);
      line-height: 1.1;
      font-weight: normal;
      font-style: normal;
      letter-spacing: 0.01em;
    }

    .bottom-bold {
      margin-top: 6px;
      font-family: "Manrope", sans-serif;
      font-size: clamp(0.54rem, 1.1svh, 0.88rem);
      letter-spacing: clamp(0.18em, 0.65vw, 0.46em);
      font-weight: 800;
      color: var(--white-soft);
      text-transform: uppercase;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88svh;
      background: var(--white-soft);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }

    .overlay-bar {
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(147,123,103,0.24);
      font-family: "Manrope", sans-serif;
      font-weight: 800;
      color: var(--dark-olive);
      flex-shrink: 0;
      background: var(--cream);
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--brown);
      cursor: pointer;
      font-size: 22px;
      color: var(--white-soft);
      font-family: "Manrope", sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--white-soft);
    }

    @media (max-width: 640px) {
      .page {
        padding: 10px 0;
      }

      .poster {
        width: 100%;
      }

      .brand-logo {
        width: min(280px, 78vw);
        max-height: clamp(78px, 16svh, 145px);
        transform: translateX(-18px);
      }

      .experience-box {
        width: 92%;
        margin-top: clamp(26px, 4.2svh, 42px);
      }

      .choose {
        margin-bottom: clamp(24px, 4svh, 36px);
      }

      .cards {
        gap: clamp(9px, 3vw, 16px);
        margin-top: clamp(8px, 1.8svh, 16px);
      }

      .view {
        font-size: clamp(0.43rem, 0.95svh, 0.54rem);
      }
    }

    @media (max-height: 700px) {
      .experience-box {
        margin-top: clamp(22px, 3.5svh, 36px);
      }

      .bottom-line {
        margin-top: clamp(8px, 1.8svh, 18px);
      }
    }

    @media (max-height: 580px) {
      .brand-logo {
        max-height: 70px;
      }

      .experience-box {
        margin-top: 18px;
      }

      .card {
        height: clamp(150px, 36svh, 210px);
      }

      .bottom-line {
        display: none;
      }
    }
  </style>
</head>

<body>
  <section class="page">
    <div class="poster">

      <div class="brand">
        <img
          src="Lumaa Logo.png"
          alt="Lumaa Salon"
          class="brand-logo"
        >
      </div>

      <div class="experience-box">
        <div class="choose">
          <div class="choose-small">CHOOSE YOUR</div>
          <div class="choose-big">Presence</div>
        </div>

        <div class="cards">

          <article class="card" onclick="openPDF('men')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPDF('men')">
            <div class="monogram">
              <img src="Lumaa Logo Fav Icon- Olive Green.jpg" alt="Lumaa Icon">
            </div>
            <div class="card-photo">
              <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=700&q=90" alt="Men Rate Card">
            </div>
            <div class="card-content">
              <h3>men</h3>
              <p>Rate Card</p>
              <div class="line"></div>
              <div class="view">View Rate Card <span class="arrow">→</span></div>
            </div>
          </article>

          <article class="card" onclick="openPDF('women')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPDF('women')">
            <div class="monogram">
              <img src="Lumaa Logo Fav Icon- Olive Green.jpg" alt="Lumaa Icon">
            </div>
            <div class="card-photo">
              <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=700&q=90" alt="Women Rate Card">
            </div>
            <div class="card-content">
              <h3>women</h3>
              <p>Rate Card</p>
              <div class="line"></div>
              <div class="view">View Rate Card <span class="arrow">→</span></div>
            </div>
          </article>

        </div>

        <div class="bottom-line">
          <div class="bottom-script">The world will adjust.</div>
          <div class="bottom-bold">BE BOLD. BE YOU.</div>
        </div>
      </div>

    </div>
  </section>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function openPDF(type) {
      const pdf = pdfs[type];

      if (isIOS()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
