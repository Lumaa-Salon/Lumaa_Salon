<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg" />
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg" />

  <style>
    @font-face {
      font-family: "Manrope";
      src: url("Manrope.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Ignogito";
      src: url("Ignogito.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #F1F1F1;
      --olive: #9CA176;
      --headline: #917A68;
      --card-brown: #563C2F;
      --footer: #888C65;
      --white: #ffffff;
      --dark: #2c2c2c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: "Manrope", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      color: var(--dark);
    }

    .page {
      width: 100%;
      height: 100dvh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: stretch;
      overflow: hidden;
    }

    .content {
      width: min(100%, 980px);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      align-items: center;
      justify-items: center;
      padding:
        max(14px, env(safe-area-inset-top))
        clamp(14px, 4vw, 58px)
        0;
      overflow: hidden;
    }

    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: clamp(4px, 1.5vh, 22px);
      padding-bottom: clamp(18px, 4vh, 48px);
    }

    .brand-logo {
      width: clamp(210px, 30vw, 360px);
      max-height: clamp(90px, 16vh, 180px);
      height: auto;
      display: block;
      object-fit: contain;
    }

    .hero-copy {
      width: 100%;
      text-align: center;
      color: var(--headline);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: clamp(18px, 3.5vh, 42px);
    }

    .headline {
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(2.05rem, 6.6vw, 5rem);
      font-weight: normal;
      line-height: 0.9;
      letter-spacing: 0.01em;
      color: var(--headline);
      white-space: nowrap;
    }

    .subline {
      margin-top: clamp(8px, 1.4vh, 16px);
      font-size: clamp(0.82rem, 1.85vw, 1.42rem);
      letter-spacing: clamp(0.28em, 1vw, 0.6em);
      font-weight: 400;
      color: var(--headline);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .presence-pill {
      margin-top: clamp(18px, 3vh, 34px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(540px, 82vw);
      height: clamp(44px, 6.4vh, 70px);
      padding: 0 clamp(22px, 5vw, 44px);
      background: var(--olive);
      color: var(--white);
      border-radius: 999px;
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(1.3rem, 3.6vw, 2.6rem);
      line-height: 1;
      white-space: nowrap;
    }

    .cards {
      width: min(100%, 820px);
      align-self: center;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(18px, 4.8vw, 58px);
      padding-bottom: clamp(18px, 3.6vh, 44px);
    }

    .card {
      position: relative;
      height: min(38vh, 500px);
      min-height: 250px;
      max-height: 500px;
      border-radius: 48% 48% 28px 28px / 34% 34% 28px 28px;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-brown);
      box-shadow: 0 20px 40px rgba(86, 60, 47, 0.18);
      border: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 26px 48px rgba(86, 60, 47, 0.25);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.04);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to top,
          rgba(86, 60, 47, 1) 0%,
          rgba(86, 60, 47, 0.9) 18%,
          rgba(86, 60, 47, 0.45) 40%,
          rgba(86, 60, 47, 0.05) 72%
        );
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(22px, 4vh, 44px);
      z-index: 2;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 14px;
    }

    .card-title {
      font-family: "Manrope", Arial, sans-serif;
      font-size: clamp(2.2rem, 5vw, 4.3rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.9;
      text-transform: lowercase;
      color: var(--white);
    }

    .card-line {
      width: min(70%, 250px);
      height: 3px;
      background: rgba(255, 255, 255, 0.92);
      margin-top: clamp(7px, 1vh, 12px);
      margin-bottom: clamp(7px, 1vh, 12px);
    }

    .rate-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--white);
      font-size: clamp(0.72rem, 1.35vw, 1.08rem);
      letter-spacing: clamp(0.2em, 0.65vw, 0.38em);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
    }

    .play-icon {
      width: clamp(17px, 1.9vw, 24px);
      height: clamp(17px, 1.9vw, 24px);
      border: 3px solid var(--white);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid var(--white);
      margin-left: 2px;
    }

    .tap-bar {
      width: 100vw;
      height: clamp(48px, 7vh, 72px);
      background: var(--footer);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      padding:
        0
        clamp(16px, 4vw, 42px)
        env(safe-area-inset-bottom);
    }

    .tap-bar span {
      font-size: clamp(0.78rem, 1.75vw, 1.16rem);
      letter-spacing: clamp(0.18em, 0.75vw, 0.42em);
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      line-height: 1.35;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88dvh;
      background: var(--bg);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .overlay-bar {
      min-height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--olive);
      color: var(--white);
      font-weight: 800;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--card-brown);
      color: var(--white);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    @media (max-width: 700px) {
      .content {
        padding:
          max(16px, env(safe-area-inset-top))
          14px
          0;
      }

      .logo-wrap {
        padding-top: 2px;
        padding-bottom: clamp(28px, 4.5vh, 46px);
      }

      .brand-logo {
        width: min(310px, 70vw);
        max-height: 135px;
      }

      .hero-copy {
        padding-bottom: clamp(24px, 3.7vh, 38px);
      }

      .headline {
        font-size: clamp(2rem, 10vw, 3.4rem);
      }

      .subline {
        margin-top: 8px;
        font-size: clamp(0.72rem, 3vw, 1rem);
        letter-spacing: 0.34em;
      }

      .presence-pill {
        margin-top: 20px;
        min-width: min(540px, 82vw);
        height: clamp(46px, 6.2vh, 56px);
        font-size: clamp(1.35rem, 5.7vw, 2rem);
      }

      .cards {
        width: 100%;
        gap: clamp(12px, 4vw, 22px);
        padding-bottom: clamp(22px, 4vh, 42px);
      }

      .card {
        height: min(33vh, 330px);
        min-height: 220px;
        border-radius: 46% 46% 22px 22px / 30% 30% 22px 22px;
      }

      .card-content {
        bottom: clamp(18px, 3.2vh, 26px);
        padding: 0 8px;
      }

      .card-title {
        font-size: clamp(2rem, 8.6vw, 3rem);
      }

      .card-line {
        height: 2px;
        width: 72%;
      }

      .rate-row {
        font-size: clamp(0.54rem, 2.1vw, 0.78rem);
        letter-spacing: 0.24em;
        gap: 7px;
      }

      .play-icon {
        width: 17px;
        height: 17px;
        border-width: 2px;
      }

      .play-icon::before {
        border-top-width: 4px;
        border-bottom-width: 4px;
        border-left-width: 6px;
      }

      .tap-bar {
        height: clamp(48px, 6.5vh, 60px);
      }

      .tap-bar span {
        font-size: clamp(0.68rem, 2.5vw, 0.88rem);
        letter-spacing: 0.24em;
      }
    }

    @media (max-width: 430px) {
      .logo-wrap {
        padding-bottom: clamp(24px, 3.8vh, 36px);
      }

      .brand-logo {
        width: min(285px, 72vw);
        max-height: 116px;
      }

      .hero-copy {
        padding-bottom: clamp(22px, 3.2vh, 32px);
      }

      .headline {
        font-size: clamp(1.78rem, 9.4vw, 2.65rem);
      }

      .subline {
        font-size: 0.64rem;
        letter-spacing: 0.28em;
      }

      .presence-pill {
        height: 46px;
        min-width: 82vw;
        padding: 0 16px;
        font-size: clamp(1.25rem, 6vw, 1.65rem);
      }

      .cards {
        gap: 14px;
        padding-bottom: clamp(22px, 3.6vh, 34px);
      }

      .card {
        height: min(32vh, 290px);
        min-height: 210px;
        border-radius: 44% 44% 18px 18px / 28% 28% 18px 18px;
      }

      .card-content {
        bottom: 18px;
      }

      .card-title {
        font-size: clamp(1.75rem, 9vw, 2.45rem);
      }

      .rate-row {
        font-size: 0.5rem;
        letter-spacing: 0.18em;
      }

      .tap-bar span {
        font-size: 0.68rem;
        letter-spacing: 0.22em;
      }
    }

    @media (max-width: 360px) {
      .content {
        padding-left: 10px;
        padding-right: 10px;
      }

      .headline {
        font-size: 1.75rem;
      }

      .presence-pill {
        height: 42px;
        font-size: 1.18rem;
      }

      .cards {
        gap: 10px;
      }

      .card {
        height: min(31vh, 255px);
        min-height: 190px;
      }

      .card-title {
        font-size: 1.7rem;
      }

      .rate-row {
        font-size: 0.46rem;
        letter-spacing: 0.14em;
      }

      .play-icon {
        width: 15px;
        height: 15px;
      }
    }

    @media (max-height: 760px) {
      .logo-wrap {
        padding-bottom: clamp(18px, 3vh, 30px);
      }

      .brand-logo {
        max-height: 110px;
      }

      .hero-copy {
        padding-bottom: clamp(18px, 3vh, 28px);
      }

      .headline {
        font-size: clamp(1.8rem, 7vh, 4rem);
      }

      .presence-pill {
        margin-top: 16px;
      }

      .card {
        height: min(31vh, 330px);
      }
    }

    @media (min-width: 900px) and (max-height: 850px) {
      .content {
        padding-top: 22px;
      }

      .logo-wrap {
        padding-bottom: 34px;
      }

      .brand-logo {
        width: 300px;
      }

      .hero-copy {
        padding-bottom: 24px;
      }

      .headline {
        font-size: 3.6rem;
      }

      .presence-pill {
        margin-top: 22px;
        height: 54px;
        font-size: 2rem;
      }

      .card {
        height: 330px;
      }

      .cards {
        padding-bottom: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">

      <div class="logo-wrap">
        <img src="Lumaa Logo.png" alt="Lumaa Salon" class="brand-logo" />
      </div>

      <section class="hero-copy">
        <h1 class="headline">The world will adjust</h1>
        <div class="subline">BE BOLD – BE YOU</div>
        <div class="presence-pill">Choose Your Presence</div>
      </section>

      <section class="cards" aria-label="Choose rate card">
        <article
          class="card"
          role="button"
          tabindex="0"
          onclick="openPDF('men')"
          onkeydown="if(event.key==='Enter')openPDF('men')"
          aria-label="Open men rate card"
        >
          <img src="men.jpg" alt="Men Rate Card" />
          <div class="card-content">
            <div class="card-title">men</div>
            <div class="card-line"></div>
            <div class="rate-row">
              <span>Rate Card</span>
              <span class="play-icon"></span>
            </div>
          </div>
        </article>

        <article
          class="card"
          role="button"
          tabindex="0"
          onclick="openPDF('women')"
          onkeydown="if(event.key==='Enter')openPDF('women')"
          aria-label="Open women rate card"
        >
          <img src="women.jpg" alt="Women Rate Card" />
          <div class="card-content">
            <div class="card-title">women</div>
            <div class="card-line"></div>
            <div class="rate-row">
              <span>Rate Card</span>
              <span class="play-icon"></span>
            </div>
          </div>
        </article>
      </section>

      <div class="tap-bar">
        <span>TAP ON ANY OPTION ABOVE TO SEE THE MENU!</span>
      </div>

    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()" aria-label="Close">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function openPDF(type) {
      const pdf = pdfs[type];

      if (!pdf) return;

      if (isIOS()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
