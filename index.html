<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg" />
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg" />

  <style>
    @font-face {
      font-family: "Manrope";
      src: url("Manrope.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Ignogito";
      src: url("Ignogito.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #F1F1F1;
      --logo-olive: #9CA176;
      --headline-brown: #917A68;
      --button-olive: #9CA176;
      --card-brown: #563C2F;
      --footer-olive: #888C65;
      --white: #ffffff;
      --shadow: rgba(86, 60, 47, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "Manrope", Arial, sans-serif;
    }

    .page {
      width: 100%;
      height: 100dvh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: stretch;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 1040px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding:
        max(20px, env(safe-area-inset-top))
        clamp(16px, 3.6vw, 54px)
        0;
      margin: 0 auto;
      overflow: hidden;
    }

    .main {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: clamp(18px, 3vh, 34px);
    }

    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: clamp(62px, 8.2dvh, 110px);
    }

    .brand-logo {
      width: clamp(260px, 28vw, 430px);
      max-width: 74vw;
      max-height: clamp(110px, 17dvh, 190px);
      height: auto;
      object-fit: contain;
      display: block;
    }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .headline {
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(2.3rem, 5.4vw, 5.2rem);
      line-height: 0.92;
      color: var(--headline-brown);
      font-weight: normal;
      white-space: nowrap;
    }

    .subline {
      margin-top: clamp(10px, 1.5dvh, 18px);
      font-size: clamp(0.78rem, 1.45vw, 1.4rem);
      letter-spacing: clamp(0.28em, 0.85vw, 0.58em);
      color: var(--headline-brown);
      text-transform: uppercase;
      font-weight: 400;
      white-space: nowrap;
    }

    .presence-pill {
      margin-top: clamp(22px, 3.2dvh, 36px);
      background: var(--button-olive);
      color: var(--white);
      border-radius: 999px;
      min-height: clamp(46px, 6.2dvh, 74px);
      min-width: min(560px, 82vw);
      padding: 0 clamp(24px, 4vw, 46px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(1.45rem, 3.25vw, 2.75rem);
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(156, 161, 118, 0.16);
    }

    .cards {
      width: 100%;
      max-width: 840px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(22px, 4.4vw, 56px);
      align-items: center;
      justify-content: center;
      margin-top: clamp(54px, 7.4dvh, 86px);
    }

    .card {
      position: relative;
      width: 100%;
      height: clamp(260px, 36dvh, 500px);
      border-radius: 48% 48% 28px 28px / 34% 34% 28px 28px;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-brown);
      box-shadow: 0 18px 32px var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 38px rgba(86, 60, 47, 0.24);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(86, 60, 47, 1) 0%,
        rgba(86, 60, 47, 0.92) 20%,
        rgba(86, 60, 47, 0.45) 42%,
        rgba(86, 60, 47, 0.04) 72%
      );
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(20px, 3.5dvh, 38px);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 12px;
      color: var(--white);
    }

    .card-title {
      font-family: "Manrope", Arial, sans-serif;
      font-size: clamp(2.1rem, 4.6vw, 4.35rem);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.06em;
      text-transform: lowercase;
      color: var(--white);
    }

    .card-line {
      width: min(72%, 255px);
      height: 3px;
      background: rgba(255, 255, 255, 0.95);
      margin: clamp(8px, 1dvh, 12px) 0;
    }

    .rate-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--white);
      font-size: clamp(0.66rem, 1.12vw, 1rem);
      letter-spacing: clamp(0.18em, 0.45vw, 0.38em);
      text-transform: uppercase;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .play-icon {
      width: clamp(16px, 1.7vw, 23px);
      height: clamp(16px, 1.7vw, 23px);
      border: 3px solid var(--white);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid var(--white);
      margin-left: 2px;
    }

    .tap-bar {
      width: 100vw;
      min-height: clamp(52px, 6.8dvh, 76px);
      background: var(--footer-olive);
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        0
        16px
        env(safe-area-inset-bottom);
      flex-shrink: 0;
    }

    .tap-bar span {
      color: var(--white);
      font-size: clamp(0.78rem, 1.35vw, 1.12rem);
      letter-spacing: clamp(0.18em, 0.5vw, 0.38em);
      text-transform: uppercase;
      font-weight: 800;
      text-align: center;
      line-height: 1.35;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88dvh;
      background: var(--bg);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .overlay-bar {
      min-height: 58px;
      padding: 0 18px;
      background: var(--button-olive);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 800;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--card-brown);
      color: var(--white);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    @media (max-width: 700px) {
      .wrap {
        padding:
          max(16px, env(safe-area-inset-top))
          14px
          0;
      }

      .logo-wrap {
        margin-bottom: clamp(58px, 7dvh, 82px);
      }

      .brand-logo {
        width: min(330px, 72vw);
        max-height: 145px;
      }

      .headline {
        font-size: clamp(2.05rem, 9.4vw, 3.45rem);
      }

      .subline {
        margin-top: 9px;
        font-size: clamp(0.68rem, 2.8vw, 0.98rem);
        letter-spacing: 0.34em;
      }

      .presence-pill {
        margin-top: 22px;
        min-width: min(560px, 82vw);
        min-height: 48px;
        font-size: clamp(1.32rem, 5.5vw, 2rem);
      }

      .cards {
        gap: 16px;
        margin-top: clamp(52px, 6.4dvh, 70px);
      }

      .card {
        height: clamp(230px, 33dvh, 320px);
        border-radius: 46% 46% 22px 22px / 30% 30% 22px 22px;
      }

      .card-content {
        bottom: 18px;
        padding: 0 8px;
      }

      .card-title {
        font-size: clamp(2rem, 8.2vw, 2.95rem);
      }

      .card-line {
        height: 2px;
        margin: 8px 0;
      }

      .rate-row {
        font-size: clamp(0.5rem, 1.8vw, 0.74rem);
        letter-spacing: 0.2em;
        gap: 6px;
      }

      .play-icon {
        width: 16px;
        height: 16px;
        border-width: 2px;
      }

      .tap-bar span {
        font-size: clamp(0.64rem, 1.8vw, 0.82rem);
        letter-spacing: 0.18em;
      }
    }

    @media (max-width: 430px) {
      .brand-logo {
        width: min(300px, 72vw);
      }

      .logo-wrap {
        margin-bottom: clamp(54px, 6.4dvh, 74px);
      }

      .headline {
        font-size: clamp(1.75rem, 8.9vw, 2.65rem);
      }

      .subline {
        font-size: 0.58rem;
        letter-spacing: 0.24em;
      }

      .presence-pill {
        min-height: 42px;
        min-width: 82vw;
        padding: 0 16px;
        font-size: clamp(1.1rem, 5.4vw, 1.55rem);
      }

      .cards {
        gap: 12px;
        margin-top: clamp(46px, 5.8dvh, 62px);
      }

      .card {
        height: clamp(205px, 30dvh, 270px);
        border-radius: 44% 44% 18px 18px / 28% 28% 18px 18px;
      }

      .card-title {
        font-size: clamp(1.65rem, 7.8vw, 2.4rem);
      }

      .rate-row {
        font-size: 0.42rem;
        letter-spacing: 0.12em;
      }

      .tap-bar {
        min-height: 48px;
      }

      .tap-bar span {
        font-size: 0.58rem;
        letter-spacing: 0.12em;
      }
    }

    @media (max-height: 780px) {
      .logo-wrap {
        margin-bottom: clamp(32px, 5dvh, 58px);
      }

      .brand-logo {
        max-height: 125px;
      }

      .headline {
        font-size: clamp(1.75rem, 4.2vw, 4rem);
      }

      .presence-pill {
        margin-top: 18px;
      }

      .cards {
        margin-top: clamp(32px, 5dvh, 54px);
      }

      .card {
        height: clamp(210px, 30dvh, 310px);
      }
    }

    @media (min-width: 900px) and (max-height: 850px) {
      .brand-logo {
        width: 340px;
        max-height: 145px;
      }

      .logo-wrap {
        margin-bottom: 54px;
      }

      .headline {
        font-size: 4.05rem;
      }

      .cards {
        margin-top: 54px;
      }

      .card {
        height: 330px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="wrap">

      <section class="main">
        <div class="logo-wrap">
          <img src="Lumaa Logo.png" alt="Lumaa Salon" class="brand-logo" />
        </div>

        <section class="hero">
          <h1 class="headline">The world will adjust</h1>
          <div class="subline">BE BOLD – BE YOU</div>
          <div class="presence-pill">Choose Your Presence</div>
        </section>

        <section class="cards" aria-label="Choose rate card">
          <article
            class="card"
            role="button"
            tabindex="0"
            onclick="openPDF('men')"
            onkeydown="if(event.key==='Enter')openPDF('men')"
            aria-label="Open men rate card"
          >
            <img src="men.jpg" alt="Men Rate Card" />
            <div class="card-content">
              <div class="card-title">men</div>
              <div class="card-line"></div>
              <div class="rate-row">
                <span>Rate Card</span>
                <span class="play-icon"></span>
              </div>
            </div>
          </article>

          <article
            class="card"
            role="button"
            tabindex="0"
            onclick="openPDF('women')"
            onkeydown="if(event.key==='Enter')openPDF('women')"
            aria-label="Open women rate card"
          >
            <img src="women.jpg" alt="Women Rate Card" />
            <div class="card-content">
              <div class="card-title">women</div>
              <div class="card-line"></div>
              <div class="rate-row">
                <span>Rate Card</span>
                <span class="play-icon"></span>
              </div>
            </div>
          </article>
        </section>
      </section>

      <div class="tap-bar">
        <span>TAP ON ANY OPTION ABOVE TO SEE THE MENU!</span>
      </div>

    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()" aria-label="Close">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isSmallMobile() {
      return window.innerWidth <= 700;
    }

    function openPDF(type) {
      const pdf = pdfs[type];
      if (!pdf) return;

      if (isIOS() || isSmallMobile()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
