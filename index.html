<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg" />
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg" />

  <style>
    @font-face {
      font-family: "Manrope";
      src: url("Manrope.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Ignogito";
      src: url("Ignogito.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #F1F1F1;
      --logo-olive: #9CA176;
      --headline-brown: #917A68;
      --button-olive: #9CA176;
      --card-brown: #563C2F;
      --footer-olive: #888C65;
      --white: #ffffff;
      --dark: #2c2c2c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: "Manrope", Arial, sans-serif;
      color: var(--dark);
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
    }

    .page {
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      justify-content: center;
    }

    .content {
      width: min(100%, 980px);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        max(38px, env(safe-area-inset-top))
        clamp(18px, 4vw, 58px)
        0;
    }

    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: clamp(10px, 3vh, 48px);
      margin-bottom: clamp(54px, 8vh, 98px);
    }

    .brand-logo {
      width: min(380px, 66vw);
      height: auto;
      display: block;
      object-fit: contain;
    }

    .hero-copy {
      width: 100%;
      text-align: center;
      color: var(--headline-brown);
      margin-bottom: clamp(26px, 4vh, 42px);
    }

    .headline {
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(2.4rem, 7.5vw, 5.25rem);
      font-weight: normal;
      line-height: 0.92;
      letter-spacing: 0.01em;
      color: var(--headline-brown);
      white-space: nowrap;
    }

    .subline {
      margin-top: clamp(12px, 1.7vh, 20px);
      font-size: clamp(1rem, 2.2vw, 1.55rem);
      letter-spacing: clamp(0.28em, 1.1vw, 0.62em);
      font-weight: 400;
      color: var(--headline-brown);
      text-transform: uppercase;
    }

    .presence-pill {
      margin-top: clamp(28px, 4vh, 40px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(540px, 82vw);
      min-height: clamp(54px, 7vh, 76px);
      padding: 0 clamp(24px, 5vw, 44px);
      background: var(--button-olive);
      color: var(--white);
      border-radius: 999px;
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(1.45rem, 4vw, 2.75rem);
      font-weight: normal;
      line-height: 1;
      box-shadow: 0 12px 28px rgba(156, 161, 118, 0.18);
      white-space: nowrap;
    }

    .cards {
      width: min(100%, 820px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(26px, 5vw, 58px);
      margin-top: clamp(54px, 8vh, 82px);
      margin-bottom: clamp(54px, 7vh, 82px);
    }

    .card {
      position: relative;
      height: clamp(360px, 48vw, 520px);
      border-radius: 48% 48% 28px 28px / 34% 34% 28px 28px;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-brown);
      box-shadow: 0 20px 40px rgba(86, 60, 47, 0.18);
      border: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 26px 48px rgba(86, 60, 47, 0.25);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.04);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to top,
          rgba(86, 60, 47, 1) 0%,
          rgba(86, 60, 47, 0.9) 18%,
          rgba(86, 60, 47, 0.45) 40%,
          rgba(86, 60, 47, 0.05) 72%
        );
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(28px, 4.6vw, 46px);
      z-index: 2;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 18px;
    }

    .card-title {
      font-family: "Manrope", Arial, sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.55rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.9;
      text-transform: lowercase;
      color: var(--white);
    }

    .card-line {
      width: min(70%, 250px);
      height: 3px;
      background: rgba(255, 255, 255, 0.92);
      margin-top: clamp(8px, 1.2vw, 12px);
      margin-bottom: clamp(8px, 1.2vw, 12px);
    }

    .rate-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--white);
      font-size: clamp(0.82rem, 1.6vw, 1.2rem);
      letter-spacing: clamp(0.22em, 0.7vw, 0.42em);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
    }

    .play-icon {
      width: clamp(18px, 2vw, 24px);
      height: clamp(18px, 2vw, 24px);
      border: 3px solid var(--white);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid var(--white);
      margin-left: 2px;
    }

    .tap-bar {
      width: 100vw;
      min-height: clamp(58px, 7vh, 78px);
      background: var(--footer-olive);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      padding:
        0
        clamp(18px, 4vw, 42px)
        env(safe-area-inset-bottom);
      margin-top: auto;
    }

    .tap-bar span {
      font-size: clamp(0.9rem, 2vw, 1.25rem);
      letter-spacing: clamp(0.22em, 0.8vw, 0.44em);
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88dvh;
      background: var(--bg);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .overlay-bar {
      min-height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--button-olive);
      color: var(--white);
      font-weight: 800;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--card-brown);
      color: var(--white);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    @media (max-width: 700px) {
      .content {
        width: 100%;
        padding:
          max(34px, env(safe-area-inset-top))
          20px
          0;
      }

      .logo-wrap {
        margin-top: clamp(10px, 2vh, 24px);
        margin-bottom: clamp(48px, 6vh, 68px);
      }

      .brand-logo {
        width: min(330px, 70vw);
      }

      .headline {
        font-size: clamp(2.15rem, 10.4vw, 3.6rem);
      }

      .subline {
        margin-top: 10px;
        font-size: clamp(0.82rem, 3.2vw, 1.1rem);
        letter-spacing: 0.42em;
      }

      .presence-pill {
        margin-top: 24px;
        min-width: min(540px, 82vw);
        min-height: 56px;
        font-size: clamp(1.5rem, 6vw, 2.15rem);
      }

      .cards {
        width: 100%;
        gap: 22px;
        margin-top: 48px;
        margin-bottom: 52px;
      }

      .card {
        height: clamp(300px, 54vw, 390px);
        border-radius: 46% 46% 24px 24px / 30% 30% 24px 24px;
      }

      .card-content {
        bottom: 26px;
        padding: 0 10px;
      }

      .card-title {
        font-size: clamp(2.35rem, 9vw, 3.4rem);
      }

      .card-line {
        height: 2px;
        width: 72%;
      }

      .rate-row {
        font-size: clamp(0.66rem, 2.3vw, 0.86rem);
        letter-spacing: 0.32em;
        gap: 7px;
      }

      .play-icon {
        width: 18px;
        height: 18px;
        border-width: 2px;
      }

      .play-icon::before {
        border-top-width: 4px;
        border-bottom-width: 4px;
        border-left-width: 6px;
      }
    }

    @media (max-width: 430px) {
      .content {
        padding-left: 14px;
        padding-right: 14px;
      }

      .brand-logo {
        width: min(300px, 72vw);
      }

      .logo-wrap {
        margin-bottom: 42px;
      }

      .headline {
        font-size: clamp(1.9rem, 10vw, 3rem);
      }

      .subline {
        font-size: 0.74rem;
        letter-spacing: 0.34em;
      }

      .presence-pill {
        min-height: 50px;
        min-width: 82vw;
        padding: 0 18px;
        font-size: clamp(1.35rem, 6.4vw, 1.85rem);
      }

      .cards {
        gap: 14px;
        margin-top: 42px;
        margin-bottom: 46px;
      }

      .card {
        height: clamp(250px, 62vw, 305px);
        border-radius: 44% 44% 20px 20px / 28% 28% 20px 20px;
      }

      .card-content {
        bottom: 22px;
      }

      .card-title {
        font-size: clamp(2rem, 10vw, 2.7rem);
      }

      .rate-row {
        font-size: 0.58rem;
        letter-spacing: 0.24em;
      }

      .tap-bar span {
        font-size: 0.78rem;
        letter-spacing: 0.28em;
      }
    }

    @media (max-width: 360px) {
      .cards {
        gap: 10px;
      }

      .card {
        height: 235px;
      }

      .card-title {
        font-size: 1.9rem;
      }

      .rate-row {
        font-size: 0.52rem;
        letter-spacing: 0.18em;
      }

      .play-icon {
        width: 16px;
        height: 16px;
      }
    }

    @media (min-width: 900px) and (max-height: 850px) {
      .content {
        padding-top: 28px;
      }

      .logo-wrap {
        margin-top: 10px;
        margin-bottom: 42px;
      }

      .brand-logo {
        width: 300px;
      }

      .hero-copy {
        margin-bottom: 22px;
      }

      .headline {
        font-size: 3.7rem;
      }

      .presence-pill {
        margin-top: 22px;
        min-height: 54px;
        font-size: 2rem;
      }

      .cards {
        margin-top: 42px;
        margin-bottom: 36px;
      }

      .card {
        height: 350px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">

      <div class="logo-wrap">
        <img src="Lumaa Logo.png" alt="Lumaa Salon" class="brand-logo" />
      </div>

      <section class="hero-copy">
        <h1 class="headline">The world will adjust</h1>
        <div class="subline">BE BOLD – BE YOU</div>

        <div class="presence-pill">Choose Your Presence</div>
      </section>

      <section class="cards" aria-label="Choose rate card">
        <article
          class="card"
          role="button"
          tabindex="0"
          onclick="openPDF('men')"
          onkeydown="if(event.key==='Enter')openPDF('men')"
          aria-label="Open men rate card"
        >
          <img src="men.jpg" alt="Men Rate Card" />
          <div class="card-content">
            <div class="card-title">men</div>
            <div class="card-line"></div>
            <div class="rate-row">
              <span>Rate Card</span>
              <span class="play-icon"></span>
            </div>
          </div>
        </article>

        <article
          class="card"
          role="button"
          tabindex="0"
          onclick="openPDF('women')"
          onkeydown="if(event.key==='Enter')openPDF('women')"
          aria-label="Open women rate card"
        >
          <img src="women.jpg" alt="Women Rate Card" />
          <div class="card-content">
            <div class="card-title">women</div>
            <div class="card-line"></div>
            <div class="rate-row">
              <span>Rate Card</span>
              <span class="play-icon"></span>
            </div>
          </div>
        </article>
      </section>

      <div class="tap-bar">
        <span>TAP ON ANY OPTION ABOVE TO SEE THE MENU!</span>
      </div>

    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()" aria-label="Close">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function openPDF(type) {
      const pdf = pdfs[type];

      if (!pdf) return;

      if (isIOS()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
