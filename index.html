<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg" />
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg" />

  <style>
    @font-face {
      font-family: "Manrope";
      src: url("Manrope.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Ignogito";
      src: url("Ignogito.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #F1F1F1;
      --logo-olive: #9CA176;
      --headline-brown: #917A68;
      --button-olive: #9CA176;
      --card-brown: #563C2F;
      --footer-olive: #888C65;
      --white: #ffffff;
      --shadow: rgba(86, 60, 47, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "Manrope", Arial, sans-serif;
    }

    body {
      color: #2b2b2b;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      height: 100svh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: stretch;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      min-height: 100svh;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding:
        max(18px, env(safe-area-inset-top))
        clamp(14px, 3.5vw, 42px)
        0;
      margin: 0 auto;
      overflow: hidden;
    }

    .main {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3vh, 34px);
      min-height: 0;
    }

    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .brand-logo {
      width: clamp(220px, 24vw, 360px);
      max-width: 78vw;
      max-height: 18svh;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.6vh, 18px);
      text-align: center;
    }

    .headline {
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(2rem, 5vw, 5rem);
      line-height: 0.95;
      color: var(--headline-brown);
      font-weight: normal;
      white-space: nowrap;
    }

    .subline {
      font-size: clamp(0.7rem, 1.4vw, 1.35rem);
      letter-spacing: clamp(0.25em, 0.8vw, 0.55em);
      color: var(--headline-brown);
      text-transform: uppercase;
      font-weight: 400;
      white-space: nowrap;
    }

    .presence-pill {
      margin-top: clamp(2px, 0.8vh, 8px);
      background: var(--button-olive);
      color: var(--white);
      border-radius: 999px;
      min-height: clamp(44px, 5.8vh, 72px);
      padding: 0 clamp(22px, 4vw, 42px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: clamp(1.3rem, 3.2vw, 2.7rem);
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(156, 161, 118, 0.16);
    }

    .cards {
      width: 100%;
      max-width: 820px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 3.2vw, 36px);
      align-items: center;
      justify-content: center;
    }

    .card {
      position: relative;
      width: 100%;
      height: clamp(250px, 39svh, 500px);
      border-radius: 48% 48% 26px 26px / 34% 34% 26px 26px;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-brown);
      box-shadow: 0 18px 32px var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 38px rgba(86, 60, 47, 0.24);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(86, 60, 47, 1) 0%,
        rgba(86, 60, 47, 0.92) 20%,
        rgba(86, 60, 47, 0.45) 42%,
        rgba(86, 60, 47, 0.04) 72%
      );
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(18px, 3.4vh, 34px);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 12px;
      color: var(--white);
    }

    .card-title {
      font-size: clamp(1.9rem, 4.5vw, 4.2rem);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.06em;
      text-transform: lowercase;
      color: var(--white);
    }

    .card-line {
      width: min(72%, 250px);
      height: 3px;
      background: rgba(255, 255, 255, 0.95);
      margin: clamp(8px, 1vh, 12px) 0;
    }

    .rate-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--white);
      font-size: clamp(0.62rem, 1.15vw, 1rem);
      letter-spacing: clamp(0.18em, 0.45vw, 0.38em);
      text-transform: uppercase;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .play-icon {
      width: clamp(16px, 1.7vw, 23px);
      height: clamp(16px, 1.7vw, 23px);
      border: 3px solid var(--white);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid var(--white);
      margin-left: 2px;
    }

    .tap-bar {
      width: 100%;
      min-height: clamp(50px, 6.5svh, 72px);
      background: var(--footer-olive);
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        0
        16px
        env(safe-area-inset-bottom);
      flex-shrink: 0;
    }

    .tap-bar span {
      color: var(--white);
      font-size: clamp(0.72rem, 1.4vw, 1.1rem);
      letter-spacing: clamp(0.18em, 0.5vw, 0.38em);
      text-transform: uppercase;
      font-weight: 800;
      text-align: center;
      line-height: 1.35;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88svh;
      background: var(--bg);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .overlay-bar {
      min-height: 58px;
      padding: 0 18px;
      background: var(--button-olive);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 800;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--card-brown);
      color: var(--white);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    /* Tablet + Mobile */
    @media (max-width: 700px) {
      .wrap {
        padding:
          max(14px, env(safe-area-inset-top))
          12px
          0;
      }

      .main {
        gap: 18px;
      }

      .brand-logo {
        width: min(300px, 68vw);
        max-height: 14svh;
      }

      .headline {
        font-size: clamp(1.8rem, 7vw, 3.2rem);
      }

      .subline {
        font-size: clamp(0.62rem, 2vw, 0.95rem);
        letter-spacing: 0.24em;
      }

      .presence-pill {
        min-height: 44px;
        font-size: clamp(1.15rem, 4.4vw, 1.8rem);
        padding: 0 18px;
        max-width: 88vw;
      }

      .cards {
        gap: 12px;
      }

      .card {
        height: clamp(220px, 33svh, 320px);
        border-radius: 44% 44% 20px 20px / 30% 30% 20px 20px;
      }

      .card-content {
        bottom: 16px;
        padding: 0 8px;
      }

      .card-title {
        font-size: clamp(1.75rem, 7vw, 2.8rem);
      }

      .card-line {
        height: 2px;
        margin: 8px 0;
      }

      .rate-row {
        font-size: clamp(0.46rem, 1.7vw, 0.72rem);
        letter-spacing: 0.16em;
        gap: 6px;
      }

      .play-icon {
        width: 16px;
        height: 16px;
        border-width: 2px;
      }

      .play-icon::before {
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
        border-left: 6px solid var(--white);
      }

      .tap-bar span {
        font-size: clamp(0.62rem, 1.8vw, 0.8rem);
        letter-spacing: 0.16em;
      }
    }

    @media (max-width: 430px) {
      .brand-logo {
        width: min(255px, 66vw);
      }

      .headline {
        font-size: clamp(1.55rem, 7vw, 2.4rem);
      }

      .subline {
        font-size: 0.56rem;
        letter-spacing: 0.18em;
      }

      .presence-pill {
        min-height: 40px;
        font-size: clamp(0.98rem, 4.8vw, 1.45rem);
        padding: 0 16px;
      }

      .cards {
        gap: 10px;
      }

      .card {
        height: clamp(205px, 31svh, 270px);
      }

      .card-title {
        font-size: clamp(1.55rem, 7.2vw, 2.3rem);
      }

      .rate-row {
        font-size: 0.42rem;
        letter-spacing: 0.12em;
      }

      .tap-bar {
        min-height: 46px;
      }

      .tap-bar span {
        font-size: 0.58rem;
        letter-spacing: 0.12em;
      }
    }

    @media (max-height: 760px) {
      .brand-logo {
        max-height: 12svh;
      }

      .headline {
        font-size: clamp(1.7rem, 4.5vw, 3.9rem);
      }

      .presence-pill {
        min-height: 42px;
      }

      .card {
        height: clamp(210px, 31svh, 300px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="wrap">

      <section class="main">
        <div class="logo-wrap">
          <img src="Lumaa Logo.png" alt="Lumaa Salon" class="brand-logo" />
        </div>

        <section class="hero">
          <h1 class="headline">The world will adjust</h1>
          <div class="subline">BE BOLD – BE YOU</div>
          <div class="presence-pill">Choose Your Presence</div>
        </section>

        <section class="cards" aria-label="Choose rate card">
          <article
            class="card"
            role="button"
            tabindex="0"
            onclick="openPDF('men')"
            onkeydown="if(event.key==='Enter')openPDF('men')"
            aria-label="Open men rate card"
          >
            <img src="men.jpg" alt="Men Rate Card" />
            <div class="card-content">
              <div class="card-title">men</div>
              <div class="card-line"></div>
              <div class="rate-row">
                <span>Rate Card</span>
                <span class="play-icon"></span>
              </div>
            </div>
          </article>

          <article
            class="card"
            role="button"
            tabindex="0"
            onclick="openPDF('women')"
            onkeydown="if(event.key==='Enter')openPDF('women')"
            aria-label="Open women rate card"
          >
            <img src="women.jpg" alt="Women Rate Card" />
            <div class="card-content">
              <div class="card-title">women</div>
              <div class="card-line"></div>
              <div class="rate-row">
                <span>Rate Card</span>
                <span class="play-icon"></span>
              </div>
            </div>
          </article>
        </section>
      </section>

      <div class="tap-bar">
        <span>TAP ON ANY OPTION ABOVE TO SEE THE MENU!</span>
      </div>

    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()" aria-label="Close">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isSmallMobile() {
      return window.innerWidth <= 700;
    }

    function openPDF(type) {
      const pdf = pdfs[type];
      if (!pdf) return;

      if (isIOS() || isSmallMobile()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
