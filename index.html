<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg" />
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg" />

  <style>
    @font-face {
      font-family: "Manrope";
      src: url("Manrope.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Ignogito";
      src: url("Ignogito.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #F1F1F1;
      --logo-olive: #9CA176;
      --headline-brown: #917A68;
      --button-olive: #9CA176;
      --card-brown: #563C2F;
      --footer-olive: #888C65;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "Manrope", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      width: 100%;
      height: 100dvh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
    }

    .poster {
      position: relative;
      width: min(100vw, 66.6667dvh);
      aspect-ratio: 2 / 3;
      background: var(--bg);
      overflow: hidden;
      container-type: inline-size;
      flex-shrink: 0;
    }

    .brand-logo {
      position: absolute;
      top: 7.2cqw;
      left: 50%;
      transform: translateX(-50%);
      width: 56cqw;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .headline {
      position: absolute;
      top: 46.4cqw;
      left: 50%;
      transform: translateX(-50%);
      width: 92cqw;
      text-align: center;
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: 7.2cqw;
      line-height: 0.95;
      font-weight: normal;
      color: var(--headline-brown);
      white-space: nowrap;
    }

    .subline {
      position: absolute;
      top: 56.2cqw;
      left: 50%;
      transform: translateX(-50%);
      width: 86cqw;
      text-align: center;
      font-family: "Manrope", Arial, sans-serif;
      font-size: 2.55cqw;
      letter-spacing: 0.46em;
      font-weight: 400;
      color: var(--headline-brown);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .presence-pill {
      position: absolute;
      top: 62.8cqw;
      left: 50%;
      transform: translateX(-50%);
      width: 54.5cqw;
      height: 7.3cqw;
      border-radius: 999px;
      background: var(--button-olive);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Ignogito", "Manrope", sans-serif;
      font-size: 3.8cqw;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 1.2cqw 2.8cqw rgba(156, 161, 118, 0.22);
    }

    .cards {
      position: absolute;
      top: 77.4cqw;
      left: 50%;
      transform: translateX(-50%);
      width: 82.5cqw;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4cqw;
    }

    .card {
      position: relative;
      height: 47.5cqw;
      border-radius: 48% 48% 3cqw 3cqw / 34% 34% 3cqw 3cqw;
      overflow: hidden;
      background: var(--card-brown);
      cursor: pointer;
      border: none;
      box-shadow: 0 2.2cqw 3.8cqw rgba(86, 60, 47, 0.18);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .men-card img {
      height: 112%;
      transform: translateY(-8%);
      object-position: center top;
    }

    .women-card img {
      object-position: center top;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(86, 60, 47, 1) 0%,
        rgba(86, 60, 47, 0.92) 18%,
        rgba(86, 60, 47, 0.52) 39%,
        rgba(86, 60, 47, 0.05) 72%
      );
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 3.5cqw;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--white);
    }

    .card-title {
      font-family: "Manrope", Arial, sans-serif;
      font-size: 5.9cqw;
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.9;
      color: var(--white);
      text-transform: lowercase;
    }

    .card-line {
      width: 63%;
      height: 0.32cqw;
      background: rgba(255, 255, 255, 0.96);
      margin-top: 1.2cqw;
      margin-bottom: 1.2cqw;
    }

    .rate-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8cqw;
      font-size: 1.35cqw;
      letter-spacing: 0.36em;
      color: var(--white);
      text-transform: uppercase;
      font-weight: 800;
      white-space: nowrap;
      line-height: 1;
    }

    .play-icon {
      width: 1.75cqw;
      height: 1.75cqw;
      border: 0.22cqw solid var(--white);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 0.34cqw solid transparent;
      border-bottom: 0.34cqw solid transparent;
      border-left: 0.5cqw solid var(--white);
      margin-left: 0.14cqw;
    }

    .tap-bar {
      position: absolute;
      top: 137.6cqw;
      left: 0;
      width: 100%;
      height: 6.5cqw;
      background: var(--footer-olive);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3cqw;
    }

    .tap-bar span {
      color: var(--white);
      font-family: "Manrope", Arial, sans-serif;
      font-size: 1.65cqw;
      letter-spacing: 0.34em;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      line-height: 1.2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88dvh;
      background: var(--bg);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .overlay-bar {
      min-height: 58px;
      padding: 0 18px;
      background: var(--button-olive);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 800;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--card-brown);
      color: var(--white);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    @media (max-aspect-ratio: 2/3) {
      .poster {
        width: 100vw;
      }
    }

    @media (min-aspect-ratio: 2/3) {
      .poster {
        width: min(100vw, 66.6667dvh);
      }
    }

    @media (max-width: 430px) {
      .brand-logo {
        top: 7cqw;
        width: 56cqw;
      }

      .headline {
        font-size: 7cqw;
      }

      .subline {
        font-size: 2.35cqw;
        letter-spacing: 0.42em;
      }

      .presence-pill {
        width: 58cqw;
        font-size: 3.6cqw;
      }

      .cards {
        width: 84cqw;
        gap: 3.5cqw;
      }

      .card-title {
        font-size: 5.8cqw;
      }

      .rate-row {
        font-size: 1.22cqw;
        letter-spacing: 0.28em;
      }

      .play-icon {
        width: 1.6cqw;
        height: 1.6cqw;
        border-width: 0.2cqw;
      }

      .tap-bar span {
        font-size: 1.5cqw;
        letter-spacing: 0.28em;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="poster">

      <img src="Lumaa Logo.png" alt="Lumaa Salon" class="brand-logo" />

      <h1 class="headline">The world will adjust</h1>
      <div class="subline">BE BOLD – BE YOU</div>
      <div class="presence-pill">Choose Your Presence</div>

      <section class="cards" aria-label="Choose rate card">
        <article
          class="card men-card"
          role="button"
          tabindex="0"
          onclick="openPDF('men')"
          onkeydown="if(event.key==='Enter')openPDF('men')"
          aria-label="Open men rate card"
        >
          <img src="men.jpg" alt="Men Rate Card" />
          <div class="card-content">
            <div class="card-title">men</div>
            <div class="card-line"></div>
            <div class="rate-row">
              <span>Rate Card</span>
              <span class="play-icon"></span>
            </div>
          </div>
        </article>

        <article
          class="card women-card"
          role="button"
          tabindex="0"
          onclick="openPDF('women')"
          onkeydown="if(event.key==='Enter')openPDF('women')"
          aria-label="Open women rate card"
        >
          <img src="women.jpg" alt="Women Rate Card" />
          <div class="card-content">
            <div class="card-title">women</div>
            <div class="card-line"></div>
            <div class="rate-row">
              <span>Rate Card</span>
              <span class="play-icon"></span>
            </div>
          </div>
        </article>
      </section>

      <div class="tap-bar">
        <span>TAP ON ANY OPTION ABOVE TO SEE THE MENU!</span>
      </div>

    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()" aria-label="Close">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isSmallMobile() {
      return window.innerWidth <= 700;
    }

    function openPDF(type) {
      const pdf = pdfs[type];
      if (!pdf) return;

      if (isIOS() || isSmallMobile()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
